<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Score CRUD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <h1>Practice</h1>
    <p>學生成績管理（新增 / 修改 / 刪除）</p>

    <!-- 新增區 -->
    <div class="form">
      <input id="nameInput" type="text" placeholder="學生姓名（例：Alex）" />
      <input id="scoreInput" type="number" placeholder="分數（0-100）" />
      <button id="addBtn">新增</button>
    </div>

    <div class="hint">
      新增：輸入姓名與分數 → 按「新增」<br>
      修改：按「修改」→ 輸入新分數 → 確定<br>
      刪除：按「刪除」
    </div>

    <!-- 清單顯示區 -->
    <ul id="list" class="list"></ul>

    <div class="footer">
      <div id="countText">Students: 0</div>
      <div id="avgText">Average: -</div>
    </div>
  </div>

  <script>
    const students = [
      { name: "Tom", score: 80 },
      { name: "Amy", score: 90 },
      { name: "John", score: 70 }
    ];

    // DOM refs
    const listEl = document.getElementById("list"); // 學生清單的 <ul>
    const nameInput = document.getElementById("nameInput"); // 學生姓名輸入框
    const scoreInput = document.getElementById("scoreInput"); // 學生成績輸入框
    const addBtn = document.getElementById("addBtn"); // 新增按鈕
    const countText = document.getElementById("countText"); // 學生人數顯示
    const avgText = document.getElementById("avgText"); // 平均分數顯示

    // TODO 1：
    // 寫一個 function isValidScore(score)
    // 需求：score 必須是 0~100 的數字，符合回傳 true，否則 false
    function isValidScore(score) {
      // TODO
      if (typeof score === "number" && score >= 0 && score <= 100) {
        return true;
      }
      return false;
    }

    // TODO 2：
    // 寫一個 function calcAverage()
    // 需求：用回圈算出平均分數
    // - 沒有學生時回傳 null
    function calcAverage() {
      // TODO
      let student_sum = 0;
      for (student of students) {
        student_sum += student.score;
        console.log(student);
      }
      if (students.length > 0) {
        return student_sum / students.length;
      }
      return null;
    }

    // TODO 3：
    // 寫一個 function render()
    // 需求：
    // - 清空 listEl
    // - 用回圈跑 students
    // - 每一筆建立 <li class="row">，內含：
    //   左側：姓名與分數
    //   右側：兩個按鈕「修改」「刪除」
    // - 按鈕要能呼叫 editStudent(i) / deleteStudent(i)
    // - 更新底部 Students 與 Average
    function render() {
      // TODO
      listEl.innerHTML = "";
      for (let i = 0; i < students.length; i++) {
          const student = students[i];
          const li = document.createElement("li");
          li.classList.add("row");
          li.innerHTML = `
              <div>${student.name}: ${student.score}</div>
              <div>
                <button onclick="editStudent(${i})">修改</button>
                <button onclick="deleteStudent(${i})">刪除</button>
              </div>
          `;
          console.log(li);
          listEl.appendChild(li);
      }
      countText.textContent = `Students: ${students.length}`;
      const avg = calcAverage();
      if (avg === null) {
        avgText.textContent = "Average: -";
      } else {
        avgText.textContent = `Average: ${avg}`;
      }
    }

    // TODO 4：
    // 寫一個 function addStudent()
    // 需求：
    // - 讀取 nameInput / scoreInput
    // - students.push({ name, score })
    // - 清空輸入框
    // - render()
    function addStudent() {
      // TODO
      const name = nameInput.value;
      const score = parseInt(scoreInput.value);
      if (name === "" || !isValidScore(score)) {
        alert("請輸入有效的姓名與分數（0-100）");
      }
      students.push({ name, score });
      nameInput.value = "";
      scoreInput.value = "";
      render();
    }

    // TODO 5：
    // 寫一個 function editStudent(index)
    // 需求：
    // - 用 prompt 取得新分數（預設帶入原本分數）
    // - 驗證分數合法
    // - students[index].score = newScore
    // - render()
    function editStudent(index) {
      // TODO
      let newScore = prompt("請輸入新的分數（0-100）", students[index].score);
      newScore = parseInt(newScore);
      if (!isValidScore(newScore)) {
        alert("請輸入有效的分數（0-100）");
      } else {
        students[index].score = newScore;
        render();
      }
    }

    // TODO 6：
    // 寫一個 function deleteStudent(index)
    // 需求：
    // - 可用 confirm 詢問是否刪除
    // - students.splice(index, 1)
    // - render()
    function deleteStudent(index) {
      // TODO
      const confirmDelete = confirm(`確定要刪除 ${students[index].name} 的資料嗎？`);
      if (confirmDelete) {
        students.splice(index, 1);
        render();
      }
    }

    // 事件：新增按鈕
    addBtn.addEventListener("click", addStudent);

    // 頁面載入先 render 一次
    render();
  </script>
</body>
</html>
